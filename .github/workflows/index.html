<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脑叶公司 - 员工模拟器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1> Lobotomy Corp. 员工模拟器 </h1>
      <div class="stats-bar">
        <div class="stat">
          <span>精神值:</span>
          <span id="sanity">100</span>
        </div>
        <div class="stat">
          <span>体力值:</span>
          <span id="health">100</span>
        </div>
        <div class="stat">
          <span>工作效率:</span>
          <span id="efficiency">80</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div id="log" class="log-box">
        欢迎你，新员工。今天是你在 Lobotomy Corporation 的第一天。请选择你的行动。
      </div>
      <div id="actions" class="actions-box"></div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
